<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Блог | Elos — лазерная эпиляция в Казани</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="articles.js"></script>
    <style>
        .blog-header {
            background: linear-gradient(135deg, var(--color-pastel) 0%, #fff 100%);
            padding: 60px 0 40px;
            text-align: center;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        .blog-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
        }
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        .blog-card-content {
            padding: 32px;
        }
        .blog-tag {
            display: inline-block;
            background: var(--color-pastel);
            color: var(--color-accent);
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .blog-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .blog-meta {
            display: flex;
            gap: 20px;
            font-size: 0.75rem;
            color: var(--color-text-light);
            margin-bottom: 20px;
        }
        .blog-meta i {
            margin-right: 6px;
            color: var(--color-accent);
        }
        .blog-excerpt {
            color: var(--color-text-light);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .article-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .article-modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 40px;
            position: relative;
        }
        .article-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .info-box, .info-box-green, .info-box-orange, .info-box-red {
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .info-box { background: var(--color-pastel); }
        .info-box-green { background: #E8F5E9; }
        .info-box-orange { background: #FFF3E0; }
        .info-box-red { background: #FFEBEE; }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .compare-table th, .compare-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .compare-table th { background: var(--color-accent); color: #fff; }
        @media (max-width: 768px) {
            .blog-card-content { padding: 24px; }
            .compare-table th, .compare-table td { padding: 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">Elos</a>
            <nav><a href="index.html" class="btn btn-secondary">← Вернуться на сайт</a></nav>
        </div>
    </header>

    <div class="blog-header">
        <div class="container">
            <h1 class="section-title" style="margin-bottom: 16px;">Блог</h1>
            <p class="section-subtext" style="margin-bottom: 0;">Полезные статьи о лазерной эпиляции.<br>Честно, без воды, с научным подходом.</p>
        </div>
    </div>

    <main>
        <section class="section-padding bg-surface" style="padding-top: 40px;">
            <div class="container">
                <div class="blog-grid" id="blogGrid"></div>
            </div>
        </section>
    </main>

    <div id="articleModal" class="article-modal" style="display: none;">
        <div class="article-modal-content">
            <button class="article-modal-close" onclick="closeArticleModal()">✕</button>
            <div id="articleModalContent"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>© Elos 2026. Лазерная эпиляция в центре Казани.</p>
            <a href="privacy.html">Политика конфиденциальности</a>
        </div>
    </footer>

    <script>
        function renderBlog() {
            const grid = document.getElementById('blogGrid');
            if (!grid || typeof ARTICLES === 'undefined') return;
            
            for (let id in ARTICLES) {
                const a = ARTICLES[id];
                const card = document.createElement('article');
                card.className = 'blog-card';
                card.onclick = () => openArticleModal(id);
                card.innerHTML = `
                    <div class="blog-card-content">
                        <span class="blog-tag">${a.tag}</span>
                        <h2 class="blog-title">${a.title}</h2>
                        <div class="blog-meta">
                            <span><i class="far fa-calendar-alt"></i> ${a.date}</span>
                            <span><i class="far fa-clock"></i> ${a.readTime}</span>
                        </div>
                        <p class="blog-excerpt">${a.excerpt}</p>
                    </div>
                `;
                grid.appendChild(card);
            }
        }
        
        function openArticleModal(id) {
            const a = ARTICLES[id];
            if (a) {
                document.getElementById('articleModalContent').innerHTML = a.fullContent;
                document.getElementById('articleModal').style.display = 'block';
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeArticleModal() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = '';
        }
        
        window.onclick = function(e) {
            const modal = document.getElementById('articleModal');
            if (e.target === modal) closeArticleModal();
        };
        
        renderBlog();
    </script>
</body>
</html>
